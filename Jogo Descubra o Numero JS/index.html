<!DOCTYPE html>
<html lang="pt-Br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles.css">
    <title>Jogo Descubra o Numero</title>
</head>
<body>
    <img src="./assets/ex6_2.jpg" class="normal" alt="jogo dos numeros">
    <h1>Jogo Descubra o Numero</h1>

    <form>
        <p>Numero
            <input type="number" min="1" max="100" id="inNumero" required autofocus>
            <input type="submit" value="Apostar" id="btSubmit">
            <input type="button" value="Jogar Novamente" id="btNovo" class="oculta">
        </p>
    </form>

    <h3>Erros: <span id="outErros">0</span></h3>
    <h3>Chances: <span id="outChances">6</span></h3>
    <h3 id="outDica" class="italico">Dica: E um numero entre 1 e 100</h3>

    <script src="./scripts.js"></script>
</body>
</html>
