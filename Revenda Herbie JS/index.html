<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles.css">
    <title>Revenda Herbie</title>
</head>
<body>
    <img src="./assets/ex6_3.jpg" alt="Revenda Herbie" class="alta">
    <h1>Revenda Herbie</h1>

    <form>
        <p>Modelo: <input type="text" id="inModelo" required autofocus></p>
        <p>Preço R$:
            <input type="number" id="inPreco" required>
            <input type="submit" value="Adicionar">
        </p>

        <input type="button" value="Listar Todos" id="btListar">
        <input type="button" value="Filtrar por Preço" id="btFiltrar">
        <input type="button" value="Simular Promoçao" id="btSimular">
        <input type="button" value="Limpar Lista" id="btLimpar">
    </form>

    <pre></pre>
    
    <script src="./scripts.js"></script>
</body>
</html>
