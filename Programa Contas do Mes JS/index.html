<!DOCTYPE html>
<html lang="pt-Br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles.css">
    <title>Programa Contas do Mes</title>
</head>
<body>
    <img src="./assets/ex5_5.jpg" class="alta" alt="Contas a Pagar">

    <h1>Programa Contas do Mes</h1>

    <form>
        <p>Descrição da Conta
            <input type="text" id="inDescricao" required>
        </p>

        <p>Valor a Pagar R$:
            <input type="number" min="0" step="0.01" id="inValor" required>
        </p>

        <input type="submit" value="Registrar Conta">
    </form>

    <pre id="outResp1"></pre>
    <pre id="outResp2"></pre>
    
    <script src="./scripts.js"></script>
</body>
</html>
